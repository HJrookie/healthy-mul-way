    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    />
    <!-- 社交分享元信息（默认；文章页会由 ArticleReader 动态覆盖） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PureEat 净食" />

    <title>PureEat · 净食</title>
    <!-- 在首屏绘制前应用主题，避免暗色模式闪烁 -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('pureeat:theme');
          if (!t) {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t || 'light');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

  </body>
